<section class="maxy-sml">
	<h1>Schedule Service</h1>
	<div class="form-container">
		<form method="post" action="schedule-service.htm" onSubmit="return validation(this)">
		<input type="hidden" name="form_fieldlist" value="Primary_Name,Last_Name,Email,Phone,State,City,Make,Model,Year,VIN,ServiceType">
		<input type="hidden" name="form_subject" value="Schedule Service Form Submission">
		<input type="hidden" name="form_thankyou" value="thankyou.htm">
		<input type="hidden" name="form_to" value="alexparsons@keatingtractor.com,derekpennington@keatingtractor.com">
		<input type="hidden" name="form_cc" value="austinapplebee@keatingtractor.com">
	
		

		<div id="formpage">
			<div class="form-header">
				<h2>Schedule Your Service</h2>
				<p>Fields marked with * are required.</p>
			</div>

		<div class="form-field-flex">
			<label for="Primary_Name" class="sr-only">First Name</label>
			<input type="text" name="Primary_Name" id="Primary_Name" placeholder="First Name *">
			<label for="Last_Name" class="sr-only">Last Name</label>
			<input type="text" name="Last_Name" id="Last_Name" placeholder="Last Name *">
		</div>
		
		<div class="form-field-flex">
			<label for="Email" class="sr-only">Email</label>
			<input type="email" name="Email" id="Email" placeholder="Email *">
			<label for="Phone" class="sr-only">Phone</label>
			<input type="text" name="Phone" id="Phone" placeholder="Phone *">
		</div>
		<div class="form-field-flex">
			<label for="State" class="sr-only">State</label>
			<input type="text" name="State" id="State" placeholder="State *">
			<label for="City" class="sr-only">City</label>
			<input type="text" name="City" id="City" placeholder="City *">
		</div>
		<div class="form-field-flex">
			<label for="Make" class="sr-only">Make</label>
			<input type="text" name="Make" id="Make" placeholder="Make *">
			<label for="Model" class="sr-only">Model</label>
			<input type="text" name="Model" id="Model" placeholder="Model *">
		</div>

		<div class="form-field-flex">
			<label for="Year" class="sr-only">Year</label>
			<input type="text" name="Year" id="Year" placeholder="Year *">
			<label for="VIN" class="sr-only">VIN</label>
			<input type="text" name="VIN" id="VIN" placeholder="VIN">
		</div>

			<label for="ServiceType" class="sr-only">What kind of service do you need done?</label>
			<textarea name="ServiceType" id="ServiceType" placeholder="What kind of service do you need done? *"></textarea>
				<div id="btn" class="include-captcha">

<!-- #include virtual="/tractorhousedlr/includes/shapesmodule.inc"-->

					<div class="captcha-button">
						 <input class="submit-button" type="submit" value="Send Now">
					 </div>
				</div>
		</div>
		</form>
		<div class="button" id="submit-btn">
			<button onclick="openCaptcha()">Send Now</button>
		</div>
</div>
</section>

</main>

<script language="javascript" type="text/javascript">
	function validation(passForm)
	{
	
		if (passForm.Primary_Name.value == "")
		{
			alert("Please enter your Name.")
			passForm.Primary_Name.focus()
			return false
		}
		
		if (passForm.Last_Name.value == "")
		{
			alert("Please enter your Last Name.")
			passForm.Last_Name.focus()
			return false
		}

		if (passForm.Email.value == "")
		{
			alert("Please enter your Email.")
			passForm.Email.focus()
			return false
		}
		
		if (passForm.Phone.value == "")
		{
			alert("Please enter your Phone.")
			passForm.Phone.focus()
			return false
		}
		
		if (passForm.State.value == "")
		{
			alert("Please enter your State.")
			passForm.State.focus()
			return false
		}
		
		if (passForm.City.value == "")
		{
			alert("Please enter your City.")
			passForm.City.focus()
			return false
		}


		if (passForm.Make.value == "")
		{
			alert("Please enter the Make.")
			passForm.Make.focus()
			return false
		}
		
		if (passForm.Model.value == "")
		{
			alert("Please enter the Model.")
			passForm.Model.focus()
			return false
		}
		
		if (passForm.Year.value == "")
		{
			alert("Please enter the Year.")
			passForm.Year.focus()
			return false
		}

		if (passForm.ServiceType.value == "")
		{
			alert("Please enter the kind of service you need done.")
			passForm.ServiceType.focus()
			return false
		}

		var answer = document.getElementById('CaptchaAnswer').value;
		if (answer == "")
		{
			alert("Please enter the characters for the security image.")
			passForm.CaptchaAnswer.focus()
			return false
		}
		
		return true
	}
</script>
<script>
	function openCaptcha() {
		var i = document.getElementById("btn");
		var x = document.getElementById("submit-btn");
		
		if (!i.style.display || i.style.display === "none"){
			i.style.display = "block";
			x.style.display = "none";
}else {
	i.style.display = "none";
	}	
}
</script>
