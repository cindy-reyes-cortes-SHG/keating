<body>

<section class="about-us-3" id="parts-request-form">
	<div class="flexy home-5-title">
		<div class="col-2-lrg">
			<h2><span>Need a Specific Part?</span>Let Us Know!</h2>
		</div>

		<div class="col-2-sml">
			<div class="home-5-bullets">
				<p><i class="fa-solid fa-check"></i> Fast Response</p>
				<p><i class="fa-solid fa-check"></i> OEM & Aftermarket Options</p>
				<p><i class="fa-solid fa-check"></i> Support for U.S. & Mexico Clients</p>
			</div>
		</div>
	</div>

	<div class="parts-request-form">
	<h2><span>Order Parts</span>Request Parts</h2>
	<p>Fields marked with * are required.</p>
	<div>
		<form method="post" action="parts-department.htm" onSubmit="return validation(this)">
		<input type="hidden" name="form_fieldlist" value="Primary_Name,Company_Name,Email,Phone,Make,Model,Year,VIN,Part,Part_Number,Quantity,Comments">
		<input type="hidden" name="form_subject" value="Parts Request Submission">
		<input type="hidden" name="form_thankyou" value="thankyou.htm">
		<input type="hidden" name="form_to" value="j.deleon@comarequipment.com">
	<div id="formpage">
		<div class="form-field-flex">
			<label for="Primary_Name" class="sr-only">Full Name</label>
			<input type="text" name="Primary_Name" id="Primary_Name" placeholder="Full Name *">
			<label for="Company_Name" class="sr-only">Company Name</label>
			<input type="text" name="Company_Name" id="Company_Name" placeholder="Company Name">

		</div>
		
		<div class="form-field-flex">
			<label for="Email" class="sr-only">Email</label>
			<input type="email" name="Email" id="Email" placeholder="Email *">
			<label for="Phone" class="sr-only">Phone</label>
			<input type="text" name="Phone" id="Phone" placeholder="Phone *">
		</div>
		<h3>Tell us about your equipment?</h3>
		<div class="form-field-flex">
			<label for="Make" class="sr-only">Make</label>
			<input type="text" name="Make" id="Make" placeholder="Make *">
			<label for="Model" class="sr-only">Model</label>
			<input type="text" name="Model" id="Model" placeholder="Model *">
		</div>
		<div class="form-field-flex">
			<label for="Year" class="sr-only">Year</label>
			<input type="text" name="Year" id="Year" placeholder="Year *">
			<label for="VIN" class="sr-only">VIN</label>
			<input type="text" name="VIN" id="VIN" placeholder="VIN">
		</div>
		<h3>Please specify the part you are looking for?</h3>
		<div class="form-field-flex">
			<label for="Part" class="sr-only">Part</label>
			<input type="text" name="Part" id="Part" placeholder="Part *">
			<label for="Part_Number" class="sr-only">Part Number</label>
			<input type="text" name="Part_Number" id="Part_Number" placeholder="Part Number *">
		</div>
		<div class="form-field-flex select-field">
			<label for="Quantity" class="sr-only">Quantity</label>
			<select name="Quantity" id="Quantity">
				<option value="">Quantity of parts *</option>
				<option value="1">1</option>
				<option value="2">2</option>
				<option value="3">3</option>
				<option value="4">4</option>
				<option value="5">5</option>
				<option value="6">6</option>
				<option value="7">7</option>
				<option value="8">8</option>
				<option value="9">9</option>
				<option value="10">10</option>
			</select>
		</div>
		<label for="Comments" class="sr-only">Comments</label>
		<textarea name="Comments" id="Comments" placeholder="Comments *"></textarea> 	
		
				<div id="btn" class="include-captcha">

				<!-- #include virtual="/marketbookdlr/includes/shapesmodule.inc"-->

					<div class="captcha-button">
						 <input class="submit-button" type="submit" value="Submit Now">
					 </div>
				</div>
		</div>
		</form>
		<div class="button" id="submit-btn">
			<button onclick="openCaptcha()">Submit Now <i class="fa-solid fa-arrow-right"></i></button>
		</div>
</div>
</div>
</section>

<script language="javascript" type="text/javascript">
	function validation(passForm)
	{
	
		if (passForm.Primary_Name.value == "")
		{
			alert("Please enter your Name.")
			passForm.Primary_Name.focus()
			return false
		}
		

		if (passForm.Email.value == "")
		{
			alert("Please enter your Email.")
			passForm.Email.focus()
			return false
		}
		
		if (passForm.Phone.value == "")
		{
			alert("Please enter your Phone.")
			passForm.Phone.focus()
			return false
		}

		if (passForm.Make.value == "")
		{
			alert("Please enter the Make of your equipment.")
			passForm.Make.focus()
			return false
		}

		if (passForm.Model.value == "")
		{
			alert("Please enter the Model of your equipment.")
			passForm.Model.focus()
			return false
		}

		if (passForm.Year.value == "")
		{
			alert("Please enter the Year of your equipment.")
			passForm.Year.focus()
			return false
		}

		if (passForm.Part.value == "")
		{
			alert("Please enter the Part of your equipment.")
			passForm.Part.focus()
			return false
		}

		if (passForm.Part_Number.value == "")
		{
			alert("Please enter the Part Number of your equipment.")
			passForm.Part_Number.focus()
			return false
		}

		if (passForm.Quantity.value == "")
		{
			alert("Please select the Quantity of parts.")
			passForm.Quantity.focus()
			return false
		}
		
		if (passForm.Comments.value == "")
		{
			alert("Please enter your comments.")
			passForm.Comments.focus()
			return false
		}

		var answer = document.getElementById('CaptchaAnswer').value;
		if (answer == "")
		{
			alert("Please enter the characters for the security image.")
			passForm.CaptchaAnswer.focus()
			return false
		}
		
		return true
	}
</script>
<script>
	function openCaptcha() {
		var i = document.getElementById("btn");
		var x = document.getElementById("submit-btn");
		
		if (!i.style.display || i.style.display === "none"){
			i.style.display = "block";
			x.style.display = "none";
}else {
	i.style.display = "none";
	}	
}
</script>
